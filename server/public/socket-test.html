<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Floraless Real-time Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    button, input {
      margin: 5px 5px 5px 0;
      padding: 8px 12px;
      cursor: pointer;
    }
    .log {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      height: 350px;
      overflow-y: auto;
      background: #f9f9f9;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>🔥 Floraless Real-time Socket Test</h2>

  <div>
    <button onclick="joinCalendar()">Join Calendar Room</button>
    <input type="month" id="monthPicker" value="2026-06">
    <button onclick="loadSnapshot()">Load Snapshot</button>
  </div>

  <div>
    <button onclick="joinChat()">Join Chat Room (Manual ID)</button>
  </div>

  <div class="log" id="log"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const logDiv = document.getElementById("log");
    const monthPicker = document.getElementById("monthPicker");

    function log(message) {
      const p = document.createElement("div");
      p.textContent = message;
      logDiv.appendChild(p);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // =========================
    // CONNECT SOCKET
    // =========================
    const socket = io({
      withCredentials: true
    });

    socket.on("connect", () => {
      log("✅ Connected: " + socket.id);
    });

    socket.on("connect_error", (err) => {
      log("❌ Connection error: " + err.message);
    });

    socket.on("disconnect", () => {
      log("❌ Disconnected");
    });

    // =========================
    // UNIVERSAL CALENDAR EVENT
    // =========================
    socket.on("calendar_refresh", (data) => {
        log("📅 Calendar change detected: " + (data?.action || "unknown"));
        loadSnapshot();
    });

    // =========================
    // CHAT EVENT
    // =========================
    socket.on("chat_new", (data) => {
      log("💬 Chat: " + data.isi_chat);
    });

    // =========================
    // FUNCTIONS
    // =========================

    function joinCalendar() {
      socket.emit("join_calendar");
      log("📡 Joined calendar_room");
      loadSnapshot();
    }

    function loadSnapshot() {
      const month = monthPicker.value;
      if (!month) return;

      fetch(`/api/jadwal/calendar?month=${month}`, {
        credentials: "include"
      })
      .then(res => res.json())
      .then(data => {
        log("📆 Snapshot loaded for " + month);
        log(JSON.stringify(data));
      })
      .catch(err => {
        log("❌ Snapshot error: " + err.message);
      });
    }

    function joinChat() {
      const roomId = prompt("Masukkan Room ID:");
      if (!roomId) return;

      socket.emit("join_room", { roomId });
      log("📡 Joined chat room: " + roomId);
    }

  </script>

</body>
</html>
