<!DOCTYPE html>
<html>
<head>
  <title>Login Test</title>
</head>
<body>
  <h2>Login Test</h2>

  <button onclick="login()">Login Admin</button>

  <script>
    async function login() {
      const res = await fetch("http://localhost:5000/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          username: "admin",
          password: "admin123"
        })
      });

      const data = await res.json();
      console.log(data);
      alert("Login selesai, cek console");
    }
  </script>
</body>
</html>
